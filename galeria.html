<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeria | Mariane Nails ✨</title>

<link rel="stylesheet" href="style.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>



<div class="container">



<h1>

Galeria de Trabalhos 💅

</h1>



<p class="descricao">

Confira alguns trabalhos realizados ✨

</p>





<div class="galeria">


<img src="img/unha1.jpeg" alt="Unha decorada 1">


<img src="img/unha2.jpeg" alt="Unha decorada 2">


<img src="img/unha3.jpeg" alt="Unha decorada 3">


<img src="img/unha4.jpeg" alt="Unha decorada 4">



</div>





<a href="index.html" class="botao voltar">


<i class="fa-solid fa-arrow-left"></i>

Voltar


</a>






<footer>

<p>

Mariane Nails Studio 💖

</p>

</footer>




</div>






<!-- Lightbox -->


<div class="lightbox">


<img src="" alt="Imagem ampliada">


</div>






<script>


const imagens = document.querySelectorAll(".galeria img");

const lightbox = document.querySelector(".lightbox");

const imagemGrande = document.querySelector(".lightbox img");



imagens.forEach(imagem => {


    imagem.addEventListener("click",()=>{


        lightbox.classList.add("active");


        imagemGrande.src = imagem.src;


    });



});





lightbox.addEventListener("click",()=>{


    lightbox.classList.remove("active");


});



</script>


<script src="script.js"></script>

</body>

</html>
