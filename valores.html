<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tabela de Valores | Mariane Nails 💅</title>

    <link rel="stylesheet" href="style.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>


<body>


<div class="container">


    <img src="img/perfil.jpeg" alt="Mariane Nails" class="foto">


    <h1>Mariane Nails 💅</h1>


    <p class="descricao">
        ✨ Tabela de Valores <br>
        Escolha o serviço ideal para você 💖
    </p>



    <div class="tabela">


        <div class="card-valor">

            <h2>✨ Esmaltação em Gel</h2>

            <div class="servico">
                <span>Pés</span>
                <strong>R$ 45</strong>
            </div>

            <div class="servico">
                <span>Mãos</span>
                <strong>R$ 40</strong>
            </div>

            <div class="servico destaque">
                <span>Pés + Mãos</span>
                <strong>R$ 80</strong>
            </div>

        </div>



        <div class="card-valor">


            <h2>💖 Esmaltação Tradicional</h2>


            <div class="servico">
                <span>Pés</span>
                <strong>R$ 30</strong>
            </div>


            <div class="servico">
                <span>Mãos</span>
                <strong>R$ 25</strong>
            </div>


            <div class="servico destaque">
                <span>Pés + Mãos</span>
                <strong>R$ 50</strong>
            </div>


        </div>


    </div>



    <a href="index.html" class="botao">

        ← Voltar

    </a>



    <p class="aviso">

        📌 Atendimento com horário marcado

    </p>


</div>


</body>

</html>
